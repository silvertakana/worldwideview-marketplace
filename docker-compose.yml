services:
  marketplace:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - marketplace-data:/app/data
    env_file:
      - path: .env.local
        required: false
    environment:
      - REGISTRY_PRIVATE_KEY=${REGISTRY_PRIVATE_KEY:?REGISTRY_PRIVATE_KEY is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}

volumes:
  marketplace-data:
